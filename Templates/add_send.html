{% extends "base.html" %}

{% block title %}Add / Send Money{% endblock %}

{% block content %}
<h1>Add Money or Send Money</h1>

<div style="width: 450px; margin: auto; border: 2px solid #ccc; padding: 20px; border-radius: 10px;">
    <form method="POST">
        <label>Action:</label>
        <select name="action" id="actionSelect">
            <option value="add">Add Money</option>
            <option value="send">Send Money</option>
        </select>

        <div id="cardFields" style="margin: 10px;">
            <label>Card Number:</label>
            <input type="text" name="card_number" placeholder="Enter card number">

            <label>Expiry Date:</label>
            <input type="text" name="expiry" placeholder="MM/YY">

            <label>CCV:</label>
            <input type="text" name="ccv" placeholder="123">

            <label>Amount:</label>
            <input type="number" name="amount1" step="0.01" min="0.01">
        </div>

        <div id="sendFields" style="margin: 10px; display: none;">
            <label>send to Account Number:</label>
            <input type="text" name="target_account">

            <label>Amount:</label>
            <input type="number" name="amount2" step="0.01" min="0.01">
        </div>

        <button type="submit" style="margin: 10px;">Submit</button>
    </form>
</div>

<script>
    const actionSelect = document.getElementById('actionSelect');
    const cardFields = document.getElementById('cardFields');
    const sendFields = document.getElementById('sendFields');

    actionSelect.addEventListener('change', () => {
        if(actionSelect.value === 'add') {
            cardFields.style.display = 'block';
            sendFields.style.display = 'none';
        } else {
            cardFields.style.display = 'none';
            sendFields.style.display = 'block';
        }
    });
</script>
{% endblock %}
