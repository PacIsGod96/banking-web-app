<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Site{% endblock %}</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        main {
            flex: 1;
        }

        header {
            padding: 15px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #801818;
            color: white;
        }

        .barItem {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 0;
            margin: 0;
        }

        .barItem li a {
            text-decoration: none;
            font-weight: bold;
            padding: 5px 10px;
            transition: 0.3s;
            border-radius: 5px;
            color: white;
        }

        .barItem li a:hover {
            cursor: pointer;
            color: blue;
        }

        .barItem li a.active {
            color: blue;
        }

        .footer {
            background-color: #801818;
            text-align: center;
            padding: 30px;
            color: white;
            
        }
        main {
            flex: 1; 
        }
           .hero{
        position: relative;
        min-height: 100vh;
        background: url('../static/photos/bank.png') center/cover no-repeat;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        flex: 1;
        
    }
.hero-content {
    position: relative;
    z-index: 2;
}

.hero-content h1 {
    font-size: 3rem;
    margin-bottom: 1rem;
}

.hero-content p {
    font-size: 1.5rem;
    margin-bottom: 2rem;
}

.hero-content button {
    padding: 10px 20px;
    font-size: 1.2rem;
    background-color: #007bff;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.hero-content button:hover {
    background-color: #0056b3;
}

    </style>
</head>
<body>
    <header>
        <ul class="barItem">
            {% if session.get('username') %}
            <li><a href="{{url_for('logout')}}">Home</a></li>
                <li><a href="{{url_for('my_account')}}">My account</a></li>
                {% if session.get('role') != 'admin' %}
                    <li><a href="{{ url_for('add_send') }}">Add/Send</a></li>
                {% endif %}
                <li><a href="{{url_for('logout')}}">Logout</a></li>
            {% endif %}
        </ul>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <h1 class="footer_logo">da footer!</h1>
    </footer>

</body>
</html>
