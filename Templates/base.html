<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Site{% endblock %}</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        header {
            padding: 15px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #801818;
            color: white;
        }

        .barItem {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 0;
            margin: 0;
        }

        .barItem li a {
            text-decoration: none;
            font-weight: bold;
            padding: 5px 10px;
            transition: 0.3s;
            border-radius: 5px;
            color: white;
        }

        .barItem li a:hover {
            cursor: pointer;
            color: blue;
        }

        .barItem li a.active {
            color: blue;
        }

        .footer {
            background-color: #801818;
            text-align: center;
            padding: 20px;
            color: white;
        }

    </style>
</head>
<body>
    <header>
        <ul class="barItem">
            <li><a href="{{url_for('home')}}">Home</a></li>
            <li><a href="{{url_for('register')}}">Register</a></li>
            <li><a href="{{url_for('my_account')}}">My account</a></li>
            <li><a href="{{url_for('add_send')}}">Add/Send</a></li>
        </ul>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer">
        <h1 class="footer_logo">da footer!</h1>
    </footer>

</body>
</html>
